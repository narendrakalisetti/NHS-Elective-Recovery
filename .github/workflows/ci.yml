name: NHS Elective Recovery — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8==7.0.0
      - name: Lint
        run: |
          flake8 src/ tests/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,W504,E501,E402,F401,C901 \
            --exclude=__pycache__,*.pyc
        continue-on-error: true

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest only
        run: pip install pytest==8.2.0 pytest-cov==5.0.0
      - name: Run tests
        run: |
          pytest tests/test_business_logic.py -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -p no:warnings \
            --tb=short
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.xml
