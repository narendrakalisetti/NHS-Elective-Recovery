name: NHS Elective Recovery — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8==7.0.0
      - name: Lint
        run: |
          flake8 src/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,W504,E501,E402,F401,C901 \
            --exclude=__pycache__,*.pyc
        continue-on-error: true

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest==8.2.0
      - name: Run tests
        run: |
          pytest tests/test_business_logic.py \
            --ignore=tests/test_pipeline.py \
            -v --tb=short -p no:warnings
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: .pytest_cache/
